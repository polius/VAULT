<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VAULT - Secure Encryption System</title>
  <meta name="description" content="Securely encrypt and decrypt your files directly in your browser." />
  <meta name="author" content="Pol Alzina" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="d-flex align-items-center justify-content-center px-3 pt-5 pb-4">
  <div class="container">
    <header class="app-header">
      <div class="header-brand-wrapper">
        <a href="/" class="header-brand">
          <div class="header-icon">
            <img src="assets/logo.svg" alt="VAULT" />
          </div>
          <h1 class="app-title">VAULT<span class="app-version">v.1.3.0</span></h1>
        </a>
      </div>
      <p class="app-subtitle">AES-GCM + PBKDF2/SHA-512</p>
      <p class="app-description">Securely <span class="text-encrypt">encrypt</span> and <span class="text-decrypt">decrypt</span> your files directly in your browser</p>
    </header>

    <div class="row gy-4">
      <div class="col-lg-6">
        <div class="card" id="encCard">
          <div class="card-loading-overlay">
            <div class="card-loading-spinner"></div>
          </div>
          <div class="card-header">
            <i class="bi bi-shield-lock"></i>
            <h3>Encrypt</h3>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="encFile" class="form-label">File</label>
              <input type="file" class="form-control" id="encFile" aria-label="Select file to encrypt" required />
              <div id="encFileInfo" class="file-info" style="display: none"></div>
            </div>
            <div class="form-group">
              <label for="encPwd" class="form-label">Password</label>
              <div class="input-group">
                <input type="password" id="encPwd" class="form-control" placeholder="Enter password" autocomplete="new-password" aria-label="Encryption password" />
                <button class="btn btn-icon" type="button" id="encPwdGenerate" title="Generate password" aria-label="Generate random password">
                  <i class="bi bi-key-fill"></i>
                </button>
                <button class="btn btn-icon" type="button" id="encPwdToggle" title="Toggle visibility" aria-label="Toggle password visibility">
                  <i class="bi bi-eye-fill" id="encPwdToggleIcon"></i>
                </button>
              </div>
              <div id="encPwdStrength" class="password-strength" style="display: none">
                <div class="strength-bar">
                  <div class="strength-fill"></div>
                </div>
                <span class="strength-text"></span>
              </div>
            </div>
            <button id="encBtn" class="btn btn-primary" aria-label="Encrypt file">Encrypt</button>
            <div id="encStatus" class="status-section" style="display: none">
              <div class="progress">
                <div id="encBar" class="progress-bar" style="width:0%">0%</div>
              </div>
              <div id="encLog" class="status-log" style="display: none">
                <i class="success-icon bi bi-check-circle-fill" style="display: none"></i>
                <span class="status-message"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card decrypt" id="decCard">
          <div class="card-loading-overlay">
            <div class="card-loading-spinner"></div>
          </div>
          <div class="card-header decrypt">
            <i class="bi bi-shield-check"></i>
            <h3>Decrypt</h3>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="decFile" class="form-label">Encrypted File (.vault)</label>
              <input type="file" class="form-control" id="decFile" accept=".vault" aria-label="Select encrypted file to decrypt" required />
              <div id="decFileInfo" class="file-info" style="display: none"></div>
            </div>
            <div class="form-group">
              <label for="decPwd" class="form-label">Password</label>
              <div class="input-group">
                <input type="password" id="decPwd" class="form-control" placeholder="Enter password" autocomplete="new-password" aria-label="Decryption password" />
                <button class="btn btn-icon" type="button" id="decPwdToggle" title="Toggle visibility" aria-label="Toggle password visibility">
                  <i class="bi bi-eye-fill" id="decPwdToggleIcon"></i>
                </button>
              </div>
            </div>
            <button id="decBtn" class="btn btn-success" aria-label="Decrypt file">Decrypt</button>
            <div id="decStatus" class="status-section" style="display: none">
              <div class="progress">
                <div id="decBar" class="progress-bar" style="width:0%">0%</div>
              </div>
              <div id="decLog" class="status-log" style="display: none">
                <i class="success-icon bi bi-check-circle-fill" style="display: none"></i>
                <span class="status-message"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="app-footer">
      <p class="footer-note">All processing happens <span class="highlight">locally</span> on your device — no uploads, no servers involved.</p>
      <p class="footer-link"><a href="https://github.com/polius/vault" target="_blank" rel="noopener noreferrer">View on GitHub</a></p>
    </footer>
  </div>

  <div id="toast-container"></div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/encrypt.js"></script>
  <script type="module" src="js/decrypt.js"></script>
</body>
</html>
